<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway - The Thoroughbred Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=5">
</head>
<body>
    <header>
        <div class="logo-container">
            <a href="index.html"><img src="gatewaylogo-notext.png" alt="Gateway Logo" class="site-logo"></a>
            <h1 class="brand-name">GATEWAY</h1>
        </div>
        <nav>
            <a href="index.html#listings">Listings</a>
            <a href="account.html">Account</a>
			<div class="auth-status">
				<span class="user-greeting">Logged in as: <strong>Shaneo24</strong></span>
				<button class="logout-btn">Logout</button>
			</div>
        </nav>
    </header>

    <section class="account-wrapper">

        <div class="account-form-container">
            <div class="form-section">
                <h3>Personal Information</h3>
                <div class="input-grid">
                    <div class="input-group">
                        <label for="fname">First Name</label>
                        <input type="text" id="fname" value="Shane">
                    </div>
                    <div class="input-group">
                        <label for="lname">Last Name</label>
                        <input type="text" id="lname" placeholder="Enter last name">
                    </div>
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="shane@example.com">
                    </div>
                    <div class="input-group">
                        <label for="phone">Cell Number</label>
                        <input type="tel" id="phone" placeholder="(555) 000-0000">
                    </div>
                </div>
                
                <div class="privacy-toggle">
                    <label>
                        <input type="checkbox" name="public_profile">
                        Make my contact information public to other users
                    </label>
                </div>
            </div>

            <div class="form-section">
                <h3>Notification Settings</h3>
                
                <div class="notification-masters">
                    <label><input type="checkbox" name="email_notif" checked> Email Notifications</label>
                    <label><input type="checkbox" name="text_notif"> Text Message Notifications</label>
                </div>

                <div class="notification-details">
                    <h4>Notify me about new postings for:</h4>
                    <div class="checkbox-grid">
					    <label><input type="checkbox" name="alert_yearling"> Yearlings</label>
						<label><input type="checkbox" name="alert_3yo"> 3-year-olds</label>
                        <label><input type="checkbox" name="alert_2you"> 2-year-olds (unraced)</label>
                        <label><input type="checkbox" name="alert_older"> 4-year-olds-and-up</label>
						<label><input type="checkbox" name="alert_2yor"> 2-year-olds (raced)</label>
						<label><input type="checkbox" name="alert_broodmares"> Broodmares</label>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button class="save-btn">Save Changes</button>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-links">
            <a href="#">Gateway © 2026</a>
            <a href="#">Privacy & Legal</a>
            <a href="#">Contact</a>
        </div>
    </footer>
	<script src="script.js?v=5"></script>
</body>
</html>
